{% extends 'base.html' %}
{% block title %}Verify OTP — Teachvion{% endblock %}
{% block content %}
<div class="container" style="max-width:440px; margin-top:60px;">
  <div style="background:white; border-radius:20px; padding:36px; box-shadow:0 4px 20px rgba(0,0,0,.08); text-align:center;">
    <div style="font-size:48px; margin-bottom:12px;">📧</div>
    <h4 class="fw-bold mb-2">Check your email</h4>
    <p class="text-muted mb-4" style="font-size:14px;">We sent a 6-digit OTP to <strong>{{ email }}</strong>. Enter it below.</p>
    <form method="post">
      {% csrf_token %}
      {{ form.email }}
      <div class="mb-3">
        <input type="text" name="otp" class="form-control form-control-lg text-center" placeholder="000000" maxlength="6" style="letter-spacing:8px; font-size:24px; font-weight:700; border-radius:12px;" required>
      </div>
      <button type="submit" class="btn w-100 rounded-pill fw-bold" style="background:linear-gradient(135deg,#5a67d8,#7b4bb7);color:white; padding:12px;">Verify OTP</button>
    </form>
    <p class="mt-3" style="font-size:13px; color:#888;">Didn't get it? <a href="{% url 'forgot_password' %}">Resend OTP</a></p>
  </div>
</div>
{% endblock %}
